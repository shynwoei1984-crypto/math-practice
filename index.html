<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>國小數學即時練習平台</title>
    <!-- 引入 Tailwind CSS 用於自適應排版與美化介面 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 KaTeX 用於渲染 LaTeX 數學公式 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col justify-between p-4 font-sans select-none">

    <!-- 主容器 -->
    <div class="max-w-md w-full mx-auto bg-white rounded-2xl shadow-sm border border-slate-100 p-6 flex-grow flex flex-col justify-between">
        
        <!-- ==================== 頁面一：主題選擇首頁 ==================== -->
        <div id="view-home" class="flex flex-col justify-center items-center h-full my-auto py-8">
            <span class="text-5xl mb-4">🏫</span>
            <h1 class="text-2xl font-bold text-slate-800 mb-2">國小數學即時練習平台</h1>
            <p class="text-sm text-slate-400 mb-8 text-center">請選擇今天要挑戰的數學單元 (共 10 題)</p>
            
            <div class="w-full flex flex-col gap-4">
                <button onclick="startApp('fractions')" class="w-full bg-gradient-to-r from-indigo-500 to-indigo-600 hover:from-indigo-600 hover:to-indigo-700 text-white font-semibold py-4 px-6 rounded-xl shadow-md shadow-indigo-100 transition-all text-left flex justify-between items-center">
                    <span>🔴 異分母分數加減 <span class="block text-xs font-normal text-indigo-100 mt-1">真/假/帶分數加減與格式防呆 (五年級)</span></span>
                    <span class="text-xl">➔</span>
                </button>
                <button onclick="startApp('time')" class="w-full bg-gradient-to-r from-amber-500 to-amber-600 hover:from-amber-600 hover:to-amber-700 text-white font-semibold py-4 px-6 rounded-xl shadow-md shadow-amber-100 transition-all text-left flex justify-between items-center">
                    <span>🔵 時間的計算 <span class="block text-xs font-normal text-amber-100 mt-1">換算、時分秒進退位與跨午前午後 (四年級)</span></span>
                    <span class="text-xl">➔</span>
                </button>
                <button onclick="startApp('geometry')" class="w-full bg-gradient-to-r from-emerald-500 to-emerald-600 hover:from-emerald-600 hover:to-emerald-700 text-white font-semibold py-4 px-6 rounded-xl shadow-md shadow-emerald-100 transition-all text-left flex justify-between items-center">
                    <span>🟢 周長與面積 <span class="block text-xs font-normal text-emerald-100 mt-1">逆向推算、複合圖形與挖空著色面積 (四年級)</span></span>
                    <span class="text-xl">➔</span>
                </button>
            </div>
        </div>

        <!-- ==================== 頁面二：練習與作答頁面 ==================== -->
        <div id="view-exercise" class="hidden flex-grow flex flex-col justify-between">
            <!-- 上方：進度與得分 -->
            <div>
                <div class="flex justify-between items-center mb-2">
                    <button onclick="goHome()" class="text-xs font-bold text-indigo-600 hover:text-indigo-800 flex items-center gap-1">◀ 返回選單</button>
                    <span class="text-xs font-semibold text-slate-400">進度：<span id="current-step">1</span> / 10</span>
                    <span class="text-xs font-semibold text-indigo-600">目前得分：<span id="display-score">0</span> 分</span>
                </div>
                <!-- 進度條 -->
                <div class="w-full bg-slate-100 h-2 rounded-full mb-4">
                    <div id="progress-bar" class="bg-indigo-600 h-2 rounded-full transition-all duration-300" style="width: 10%"></div>
                </div>

                <!-- 題目顯示區 -->
                <div class="bg-slate-50 rounded-xl p-4 text-center mb-4 min-h-[80px] flex flex-col items-center justify-center border border-dashed border-slate-200">
                    <div id="math-question" class="text-lg text-slate-800 font-medium">載入中...</div>
                </div>

                <!-- 幾何 SVG 渲染區 -->
                <div id="svg-container" class="hidden bg-white border border-slate-100 rounded-xl p-4 mb-4 flex justify-center items-center">
                    <!-- SVG 幾何圖會動態插入在這裡 -->
                </div>

                <!-- 答案輸入區 -->
                <div class="flex justify-center items-center gap-2 mb-4 min-h-[100px] bg-slate-50/50 rounded-xl p-2 border border-slate-100" id="answer-zone">
                    <!-- 答案輸入格會動態插入在這裡 -->
                </div>

                <!-- 提示與診斷反饋區 -->
                <div id="feedback-area" class="hidden rounded-xl p-4 mb-4 text-center text-sm font-semibold"></div>
                <div id="hint-text-area" class="hidden bg-amber-50 border border-amber-100 text-amber-800 rounded-xl p-4 mb-4 text-sm leading-relaxed"></div>
            </div>

            <!-- 下方：操作按鈕與虛擬鍵盤 -->
            <div>
                <!-- 功能按鈕 -->
                <div class="flex gap-3 mb-4">
                    <button id="btn-hint" onclick="useHint()" class="flex-1 bg-amber-500 hover:bg-amber-600 text-white font-medium py-3 px-4 rounded-xl shadow-sm transition-colors text-xs flex justify-center items-center gap-1">
                        💡 提示 (扣3分)
                    </button>
                    <button id="btn-submit" onclick="submitAnswer()" class="flex-grow-[2] bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 px-6 rounded-xl shadow-sm transition-colors text-sm" disabled>
                        送出答案
                    </button>
                    <button id="btn-next" onclick="nextQuestion()" class="hidden flex-grow-[2] bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-3 px-6 rounded-xl shadow-sm transition-colors text-sm">
                        下一題
                    </button>
                </div>

                <!-- 動態變形虛擬鍵盤區 -->
                <div id="keyboard-container" class="bg-slate-100 rounded-2xl p-3">
                    <!-- 鍵盤按鈕由 JS 根據單元動態生成 -->
                </div>
            </div>
        </div>

        <!-- ==================== 頁面三：結算頁面 ==================== -->
        <div id="view-result" class="hidden text-center py-8 my-auto">
            <span class="text-6xl">🎉</span>
            <h2 class="text-2xl font-bold text-slate-800 mt-6">挑戰結束！</h2>
            <p class="text-slate-500 mt-2">太棒了，你已經完成了 10 題練習！</p>
            
            <div class="my-6 bg-indigo-50 rounded-2xl p-6 border border-indigo-100 inline-block w-full">
                <span class="text-slate-600 block text-sm">最終結算總分</span>
                <span class="text-5xl font-black text-indigo-600"><span id="final-score">0</span> <span class="text-xl">分</span></span>
            </div>

            <!-- 錯題知識點診斷清單 -->
            <div id="diagnostic-box" class="hidden text-left mb-6">
                <h3 class="text-sm font-bold text-slate-500 mb-3">📋 錯題觀念診斷分析：</h3>
                <div id="diagnostic-list" class="flex flex-col gap-3"></div>
            </div>

            <button onclick="goHome()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-4 px-6 rounded-xl shadow-md transition-colors">
                返回主選單
            </button>
        </div>

    </div>

    <!-- 腳本邏輯 -->
    <script>
        // ==================== 1. 全域變數狀態 ====================
        let currentTopic = '';
        let currentIndex = 0;
        let score = 0;
        let questionScore = 10; 
        let activeInputId = null;
        let selectedUnit = ''; 
        let wrongQuestionsInfo = []; 
        let activeQuestions = []; 

        function getGCD(a, b) {
            return b ? getGCD(b, a % b) : a;
        }
        function getLCM(a, b) {
            return (a * b) / getGCD(a, b);
        }

        // ==================== 2. 動態出題引擎 ====================
        function generateQuestions(topic) {
            if (topic === 'fractions') return generateFractionsQuestions();
            if (topic === 'time') return generateTimeQuestions();
            if (topic === 'geometry') return generateGeometryQuestions();
        }

        // --- 2.1 分數動態出題引擎 ---
        function generateFractionsQuestions() {
            const list = [];
            const denominators = [2, 3, 4, 5, 6, 8, 9];
            for (let i = 1; i <= 10; i++) {
                let d1, d2, n1, n2, w1 = 0, w2 = 0, isAddition = true, template = 'fraction';
                let diffTag = i <= 5 ? "【基本題】" : "【挑戰題】";
                
                if (i <= 2) {
                    d1 = Math.random() > 0.5 ? 2 : 3;
                    d2 = d1 * 2; 
                    n1 = 1;
                    n2 = 1;
                    isAddition = Math.random() > 0.5;
                } else if (i <= 5) {
                    d1 = denominators[Math.floor(Math.random() * denominators.length)];
                    d2 = d1;
                    while (d2 === d1) d2 = denominators[Math.floor(Math.random() * denominators.length)];
                    n1 = Math.floor(Math.random() * (d1 - 1)) + 1;
                    n2 = Math.floor(Math.random() * (d2 - 1)) + 1;
                    isAddition = Math.random() > 0.5;
                } else if (i === 6) {
                    d1 = denominators[Math.floor(Math.random() * denominators.length)];
                    d2 = d1;
                    while (d2 === d1) d2 = denominators[Math.floor(Math.random() * denominators.length)];
                    n1 = Math.floor(Math.random() * d1) + d1 + 1; 
                    n2 = Math.floor(Math.random() * (d2 - 1)) + 1;
                    isAddition = false;
                } else if (i === 7) {
                    d1 = 3; d2 = 4;
                    n1 = 2; n2 = 3; 
                    w1 = Math.floor(Math.random() * 2) + 1;
                    w2 = Math.floor(Math.random() * 2) + 1;
                    isAddition = true;
                    template = 'mixed';
                } else if (i === 8) {
                    d1 = 3; d2 = 2;
                    n1 = 1; n2 = 1; 
                    w1 = 3; w2 = 1;
                    isAddition = false;
                    template = 'mixed';
                } else if (i === 9) {
                    d1 = 4; d2 = 3;
                    n1 = 1; n2 = 2; 
                    w1 = 2; w2 = 0; 
                    isAddition = false;
                    template = 'mixed';
                } else if (i === 10) {
                    d1 = 7; d2 = 8;
                    n1 = 2; n2 = 3; 
                    w1 = 4; w2 = 1;
                    isAddition = false;
                    template = 'mixed';
                }

                let v1 = w1 + n1/d1;
                let v2 = w2 + n2/d2;
                if (!isAddition && v1 < v2) {
                    let tempW = w1; w1 = w2; w2 = tempW;
                    let tempN = n1; n1 = n2; n2 = tempN;
                    let tempD = d1; d1 = d2; d2 = tempD;
                    v1 = w1 + n1/d1;
                    v2 = w2 + n2/d2;
                }

                const val = isAddition ? (v1 + v2) : (v1 - v2);
                const op = isAddition ? "+" : "-";
                const part1 = w1 > 0 ? `${w1}\\frac{${n1}}{${d1}}` : `\\frac{${n1}}{${d1}}`;
                const part2 = w2 > 0 ? `${w2}\\frac{${n2}}{${d2}}` : `\\frac{${n2}}{${d2}}`;
                const latex = `${part1} ${op} ${part2}`;
                const lcm = getLCM(d1, d2);
                
                let hint = `${diffTag}通分提示：分母 ${d1} 和 ${d2} 的最小公倍數是 ${lcm}。請將分母通分為 ${lcm} 再進行加減。`;
                if (i === 7) hint += "分數相加如果大於 1，請記得向整數進位：$$\\frac{17}{12} = 1\\frac{5}{12}$$";
                if (i >= 8) hint += "分數不夠減時，要記得向整數借 1。借過來的 1 可以換成與分母相同的分數：$$1 = \\frac{6}{6}$$";

                list.push({
                    id: i, latex: latex, value: val, template: template, hint: hint, difficulty: i <= 5 ? "basic" : "advanced"
                });
            }
            return list;
        }

        // --- 2.2 時間動態出題引擎 ---
        function generateTimeQuestions() {
            const list = [];
            for (let i = 1; i <= 10; i++) {
                let label = "", type = "", val_type = "", correct = {}, hint = "";
                let diffTag = i <= 5 ? "【基本題】" : "【挑戰題】";
                
                if (i === 1) {
                    let h = Math.floor(Math.random() * 3) + 2;
                    label = `把 ${h} 小時換成「分鐘」是多少分鐘？`;
                    type = "conv-hm"; val_type = "num"; correct = { val: h * 60 };
                    hint = `${diffTag}提示：1 小時是 60 分鐘。所以：$$${h} \\text{ 小時} = ${h} \\times 60 \\text{ 分鐘}$$`;
                } else if (i === 2) {
                    let d = 1;
                    let h = Math.floor(Math.random() * 8) + 2;
                    label = `把 ${d} 天 ${h} 小時換成「小時」是多少小時？`;
                    type = "conv-dh"; val_type = "num"; correct = { val: d * 24 + h };
                    hint = `${diffTag}提示：1 天是 24 小時。所以：$$${d} \\text{ 天} ${h} \\text{ 小時} = 24 + ${h} \\text{ 小時}$$`;
                } else if (i === 3) {
                    let h1 = Math.floor(Math.random() * 3) + 1;
                    let m1 = Math.floor(Math.random() * 15) + 10;
                    let h2 = Math.floor(Math.random() * 3) + 1;
                    let m2 = Math.floor(Math.random() * 15) + 10;
                    label = `${h1}小時${m1}分鐘 + ${h2}小時${m2}分鐘`;
                    type = "add-hm-nocarry"; val_type = "hm"; correct = { h: h1+h2, m: m1+m2 };
                    hint = `${diffTag}提示：分和分相加 ($${m1}+${m2}$)，時和時相加 ($${h1}+${h2}$)。這題的分沒有超過 60，不用進位喔。`;
                } else if (i === 4) {
                    let h1 = Math.floor(Math.random() * 4) + 4;
                    let m1 = Math.floor(Math.random() * 15) + 35;
                    let h2 = Math.floor(Math.random() * 2) + 1;
                    let m2 = Math.floor(Math.random() * 15) + 10;
                    label = `${h1}小時${m1}分鐘 - ${h2}小時${m2}分鐘`;
                    type = "sub-hm-noborrow"; val_type = "hm"; correct = { h: h1-h2, m: m1-m2 };
                    hint = `${diffTag}提示：這題的「分」直接夠減 ($${m1} - ${m2}$)，不需要借位。`;
                } else if (i === 5) {
                    let d1 = 1; let h1 = Math.floor(Math.random() * 4) + 2;
                    let d2 = 1; let h2 = Math.floor(Math.random() * 4) + 2;
                    label = `${d1}天${h1}小時 + ${d2}天${h2}小時`;
                    type = "add-dh-nocarry"; val_type = "dh"; correct = { d: d1+d2, h: h1+h2 };
                    hint = `${diffTag}提示：天加天，小時加小時。這題的小時相加沒有超過 24，不需要進位。`;
                } else if (i === 6) {
                    let h1 = Math.floor(Math.random() * 3) + 1;
                    let m1 = Math.floor(Math.random() * 20) + 35;
                    let h2 = Math.floor(Math.random() * 3) + 1;
                    let m2 = Math.floor(Math.random() * 20) + 35;
                    let totalM = m1 + m2;
                    label = `${h1}小時${m1}分鐘 + ${h2}小時${m2}分鐘`;
                    type = "add-hm-carry"; val_type = "hm";
                    correct = { h: h1+h2 + Math.floor(totalM/60), m: totalM % 60 };
                    hint = `${diffTag}提示：分相加為 ${totalM}，超過 60 了。請將滿 60 分鐘的部分進位成 1 小時。$$60 \\text{ 分} \\rightarrow 1 \\text{ 時}$$`;
                } else if (i === 7) {
                    let h1 = Math.floor(Math.random() * 5) + 4;
                    let m1 = Math.floor(Math.random() * 15) + 10;
                    let h2 = Math.floor(Math.random() * 2) + 1;
                    let m2 = Math.floor(Math.random() * 20) + 35;
                    label = `${h1}小時${m1}分鐘 - ${h2}小時${m2}分鐘`;
                    type = "sub-hm-borrow"; val_type = "hm";
                    correct = { h: h1 - h2 - 1, m: m1 + 60 - m2 };
                    list.push({
                        id: i, label, type, val_type, correct, h1_raw: h1, m1_raw: m1, h2_raw: h2, m2_raw: m2,
                        hint: `${diffTag}提示：${m1} 分不夠減 ${m2} 分，向時借 1 小時（60 分鐘）：$$1 \\text{ 時} \\rightarrow 60 \\text{ 分（不是 100 分喔！）}$$`
                    });
                    continue;
                } else if (i === 8) {
                    let d1 = Math.floor(Math.random() * 3) + 3;
                    let h1 = Math.floor(Math.random() * 8) + 2;
                    let d2 = Math.floor(Math.random() * (d1-2)) + 1;
                    let h2 = Math.floor(Math.random() * 8) + 14;
                    label = `${d1}天${h1}小時 - ${d2}天${h2}小時`;
                    type = "sub-dh-borrow"; val_type = "dh";
                    correct = { d: d1 - d2 - 1, h: h1 + 24 - h2 };
                    list.push({
                        id: i, label, type, val_type, correct, d1_raw: d1, h1_raw: h1, d2_raw: d2, h2_raw: h2,
                        hint: `${diffTag}提示：${h1} 小時不夠減 ${h2} 小時，向天借 1 天（24 小時）：$$1 \\text{ 天} \\rightarrow 24 \\text{ 小時（千萬不要借成 100 小時！）}$$`
                    });
                    continue;
                } else if (i === 9) {
                    let m1 = Math.floor(Math.random() * 15) + 10;
                    let s1 = Math.floor(Math.random() * 20) + 35;
                    let m2 = Math.floor(Math.random() * 15) + 10;
                    let s2 = Math.floor(Math.random() * 20) + 35;
                    let totalS = s1 + s2;
                    label = `${m1}分鐘${s1}秒 + ${m2}分鐘${s2}秒`;
                    type = "add-ms-carry"; val_type = "ms";
                    correct = { m: m1+m2 + Math.floor(totalS/60), s: totalS % 60 };
                    hint = `${diffTag}提示：秒相加為 ${totalS}，超過 60 秒要進位為 1 分鐘：$$60 \\text{ 秒} \\rightarrow 1 \\text{ 分}$$`;
                } else if (i === 10) {
                    let h1 = Math.floor(Math.random() * 3) + 8; // 8~10 AM
                    let m1 = Math.floor(Math.random() * 25) + 25; // 25~49
                    let h2_pm = Math.floor(Math.random() * 3) + 2; // 2~4 PM
                    let m2 = Math.floor(Math.random() * 20) + 10; // 10~29
                    
                    label = `從「上午 ${h1} 時 ${m1} 分」到「下午 ${h2_pm} 時 ${m2} 分」，一共經過了幾小時幾分鐘？`;
                    type = "cross-noon"; val_type = "hm";
                    
                    let h2_24 = h2_pm + 12;
                    let ansH = h2_24 - h1;
                    let ansM = m2 - m1;
                    if (ansM < 0) {
                        ansH = ansH - 1;
                        ansM = ansM + 60;
                    }
                    correct = { h: ansH, m: ansM };
                    hint = `${diffTag}大魔王提示：請先把下午的時間換算成「24小時制」（下午 ${h2_pm} 時就是 $${h2_pm}+12= ${h2_24}$ 時），然後再進行減法計算：$$${h2_24} \\text{ 時} ${m2} \\text{ 分} - ${h1} \\text{ 時} ${m1} \\text{ 分}$$`;
                }

                list.push({ id: i, label, type, val_type, correct, hint });
            }
            return list;
        }

        // --- 2.3 幾何動態出題引擎 (已完全修復標題空白問題) ---
        function generateGeometryQuestions() {
            const list = [];
            const units = ["cm", "m"];
            
            for (let i = 1; i <= 10; i++) {
                let label = "", value = 0, unit = "", svg = "", hint = "";
                let difficultyDesc = i <= 5 ? "【基本題】" : "【挑戰題】";
                let u = units[Math.floor(Math.random() * units.length)];
                let uArea = u + "²";

                if (i === 1) {
                    label = "求出此長方形的「周長」";
                    let w = Math.floor(Math.random() * 6) + 6; 
                    let h = Math.floor(Math.random() * 3) + 3; 
                    value = (w + h) * 2;
                    unit = u;
                    // 偏移 x=55，防切 [1]
                    svg = `<svg viewBox="0 0 240 120" class="w-48 h-28"><rect x="55" y="20" width="140" height="80" fill="#f8fafc" stroke="#334155" stroke-width="3" /><text x="125" y="15" fill="#475569" font-size="12" font-weight="bold" text-anchor="middle">${w} ${u}</text><text x="45" y="65" fill="#475569" font-size="12" font-weight="bold" text-anchor="end" dominant-baseline="middle">${h} ${u}</text></svg>`;
                    hint = `${difficultyDesc}提示：長方形周長公式 = $(\\text{長} + \\text{寬}) \\times 2$。周長要搭配長度單位 $\\text{${u}}$。`;
                } else if (i === 2) {
                    label = "求出此正方形的「面積」";
                    let s = Math.floor(Math.random() * 6) + 4; 
                    value = s * s;
                    unit = uArea;
                    svg = `<svg viewBox="0 0 200 160" class="w-36 h-36"><rect x="55" y="20" width="120" height="120" fill="#e0f2fe" stroke="#0284c7" stroke-width="3" /><text x="115" y="15" fill="#0369a1" font-size="12" font-weight="bold" text-anchor="middle">${s} ${u}</text><text x="45" y="80" fill="#0369a1" font-size="12" font-weight="bold" text-anchor="end" dominant-baseline="middle">${s} ${u}</text></svg>`;
                    hint = `${difficultyDesc}提示：正方形面積公式 = $\\text{邊長} \\times \\text{邊長}$。單位要使用 $\\text{${uArea}}$。`;
                } else if (i === 3) {
                    label = "求出此長方形的「面積」";
                    let w = Math.floor(Math.random() * 6) + 8; 
                    let h = Math.floor(Math.random() * 4) + 3; 
                    value = w * h;
                    unit = uArea;
                    svg = `<svg viewBox="0 0 240 120" class="w-48 h-28"><rect x="55" y="20" width="140" height="80" fill="#e0f2fe" stroke="#0284c7" stroke-width="3" /><text x="125" y="15" fill="#0369a1" font-size="12" font-weight="bold" text-anchor="middle">${w} ${u}</text><text x="45" y="65" fill="#0369a1" font-size="12" font-weight="bold" text-anchor="end" dominant-baseline="middle">${h} ${u}</text></svg>`;
                    hint = `${difficultyDesc}提示：長方形面積公式 = $\\text{長} \\times \\text{寬}$。`;
                } else if (i === 4) {
                    let s = Math.floor(Math.random() * 6) + 4; 
                    let p = s * 4;
                    label = `已知此正方形的周長是 ${p} ${u}，求「邊長」是多少？`;
                    value = s;
                    unit = u;
                    svg = `<svg viewBox="0 0 200 160" class="w-36 h-36"><rect x="55" y="20" width="120" height="120" fill="#f8fafc" stroke="#475569" stroke-width="3" /><text x="115" y="80" fill="#475569" font-size="12" font-weight="bold" text-anchor="middle">周長 = ${p} ${u}</text></svg>`;
                    hint = `${difficultyDesc}逆向思考提示：正方形有 4 條一樣長的邊。$$\\text{邊長} = \\text{周長} \\div 4$$`;
                } else if (i === 5) {
                    let h = Math.floor(Math.random() * 4) + 3;
                    let w = Math.floor(Math.random() * 5) + 7;
                    let area = w * h;
                    label = `已知此長方形的面積是 ${area} ${uArea}，寬是 ${h} ${u}，求「長」是多少？`;
                    value = w;
                    unit = u;
                    svg = `<svg viewBox="0 0 240 120" class="w-48 h-28"><rect x="55" y="20" width="140" height="80" fill="#e0f2fe" stroke="#0284c7" stroke-width="3" /><text x="125" y="70" fill="#0369a1" font-size="12" font-weight="bold" text-anchor="middle">面積 = ${area} ${uArea}</text><text x="45" y="65" fill="#0369a1" font-size="12" font-weight="bold" text-anchor="end" dominant-baseline="middle">寬 = ${h} ${u}</text></svg>`;
                    hint = `${difficultyDesc}逆向思考提示：長方形面積是長乘以寬。$$\\text{長} = \\text{面積} \\div \\text{寬}$$`;
                } else if (i === 6) {
                    label = "求出此L型複合圖形的「面積」";
                    let w_top = Math.floor(Math.random() * 2) + 3;
                    let w_cut = Math.floor(Math.random() * 2) + 3;
                    let H = Math.floor(Math.random() * 3) + 7;
                    let h_right = Math.floor(Math.random() * 2) + 3;
                    let W = w_top + w_cut;
                    let h_cut = H - h_right;
                    value = W * H - w_cut * h_cut;
                    unit = uArea;
                    // 左偏移 60px [1]
                    svg = `<svg viewBox="0 0 220 200" class="w-44 h-44"><path d="M 60,30 L 120,30 L 120,100 L 190,100 L 190,170 L 60,170 Z" fill="#e0f2fe" stroke="#0284c7" stroke-width="3" /><text x="90" y="25" fill="#0369a1" font-size="11" font-weight="bold" text-anchor="middle">${w_top} ${u}</text><text x="155" y="95" fill="#0369a1" font-size="11" font-weight="bold" text-anchor="middle">${w_cut} ${u}</text><text x="50" y="100" fill="#0369a1" font-size="11" font-weight="bold" text-anchor="end">${H} ${u}</text><text x="198" y="135" fill="#0369a1" font-size="11" font-weight="bold" text-anchor="start">${h_right} ${u}</text><text x="125" y="188" fill="#0369a1" font-size="11" font-weight="bold" text-anchor="middle">${W} ${u}</text><text x="125" y="65" fill="#0369a1" font-size="10" font-weight="bold" text-anchor="start" dominant-baseline="middle">${h_cut} ${u}</text></svg>`;
                    hint = `${difficultyDesc}提示：切成兩個長方形計算：左邊的 $${w_top} \\times ${H}$ 和右邊的 $${w_cut} \\times ${h_right}$。`;
                } else if (i === 7) {
                    label = "求出此L型複合圖形的「面積」（請先算出未標示的邊長）";
                    let w_top = Math.floor(Math.random() * 2) + 3;
                    let w_cut = Math.floor(Math.random() * 2) + 3;
                    let H = Math.floor(Math.random() * 3) + 7;
                    let h_right = Math.floor(Math.random() * 2) + 3;
                    let W = w_top + w_cut;
                    let h_cut = H - h_right;
                    value = W * H - w_cut * h_cut;
                    unit = uArea;
                    svg = `<svg viewBox="0 0 220 200" class="w-44 h-44"><path d="M 60,30 L 120,30 L 120,100 L 190,100 L 190,170 L 60,170 Z" fill="#e0f2fe" stroke="#0284c7" stroke-width="3" /><text x="155" y="95" fill="#0369a1" font-size="11" font-weight="bold" text-anchor="middle">${w_cut} ${u}</text><text x="50" y="100" fill="#0369a1" font-size="11" font-weight="bold" text-anchor="end">${H} ${u}</text><text x="125" y="188" fill="#0369a1" font-size="11" font-weight="bold" text-anchor="middle">${W} ${u}</text><text x="125" y="65" fill="#0369a1" font-size="10" font-weight="bold" text-anchor="start" dominant-baseline="middle">${h_cut} ${u}</text></svg>`;
                    hint = `${difficultyDesc}提示：上方橫邊沒有標示。請先用底部總寬減去裁切寬算出它：$$${W} - ${w_cut} = ${w_top} \\text{ ${u}}$$再將圖形切開來算面積。`;
                } else if (i === 8) {
                    label = "求出此L型複合圖形的「周長」（請先算出未標示的邊長）";
                    let w_top = Math.floor(Math.random() * 2) + 3;
                    let w_cut = Math.floor(Math.random() * 2) + 3;
                    let H = Math.floor(Math.random() * 3) + 7;
                    let h_right = Math.floor(Math.random() * 2) + 3;
                    let W = w_top + w_cut;
                    let h_cut = H - h_right;
                    value = (W + H) * 2;
                    unit = u;
                    svg = `<svg viewBox="0 0 220 200" class="w-44 h-44"><path d="M 60,30 L 120,30 L 120,100 L 190,100 L 190,170 L 60,170 Z" fill="#f8fafc" stroke="#334155" stroke-width="3" /><text x="155" y="95" fill="#475569" font-size="11" font-weight="bold" text-anchor="middle">${w_cut} ${u}</text><text x="50" y="100" fill="#475569" font-size="11" font-weight="bold" text-anchor="end">${H} ${u}</text><text x="125" y="188" fill="#475569" font-size="11" font-weight="bold" text-anchor="middle">${W} ${u}</text><text x="125" y="65" fill="#475569" font-size="10" font-weight="bold" text-anchor="start" dominant-baseline="middle">${h_cut} ${u}</text></svg>`;
                    hint = `${difficultyDesc}周長提示：周長是外圍「全部 6 條邊」的總和。上方短邊為 $${W}-${w_cut}=${w_top}$，右側短邊為 $${H}-${h_cut}=${h_right}$。`;
                } else if (i === 9) {
                    label = "求出著色部分（大長方形減去內挖空）的「面積」";
                    let W_out = 12;
                    let H_out = 8;
                    let w_in = 5;
                    let h_in = 3;
                    value = W_out * H_out - w_in * h_in;
                    unit = uArea;
                    svg = `<svg viewBox="0 0 240 140" class="w-48 h-28"><rect x="55" y="20" width="140" height="100" fill="#e0f2fe" stroke="#0284c7" stroke-width="3" /><rect x="100" y="50" width="50" height="40" fill="#ffffff" stroke="#0284c7" stroke-width="1.5" stroke-dasharray="3,3" /><text x="125" y="15" fill="#0369a1" font-size="11" font-weight="bold" text-anchor="middle">外長 = ${W_out} ${u}</text><text x="45" y="70" fill="#0369a1" font-size="11" font-weight="bold" text-anchor="end" dominant-baseline="middle">外寬 = ${H_out} ${u}</text><text x="125" y="75" fill="#0284c7" font-size="9" font-weight="bold" text-anchor="middle">內挖空長 ${w_in} ${u}, 寬 ${h_in} ${u}</text></svg>`;
                    hint = `${difficultyDesc}提示：著色面積（外圍那一圈）可以使用大面積減去小面積：$$\\text{著色面積} = \\text{大面積} - \\text{中間挖空面積}$$`;
                } else if (i === 10) {
                    label = "求出此L型複合圖形的「周長」（請先算出所有未標示的邊長）";
                    let w_top = 4;
                    let w_cut = 6;
                    let H = 10;
                    let h_right = 4;
                    let W = w_top + w_cut;
                    let h_cut = H - h_right;
                    value = (W + H) * 2;
                    unit = u;
                    svg = `<svg viewBox="0 0 220 200" class="w-44 h-44"><path d="M 60,30 L 110,30 L 110,100 L 190,100 L 190,170 L 60,170 Z" fill="#f8fafc" stroke="#334155" stroke-width="3" /><text x="85" y="25" fill="#475569" font-size="11" font-weight="bold" text-anchor="middle">4 ${u}</text><text x="150" y="95" fill="#475569" font-size="11" font-weight="bold" text-anchor="middle">6 ${u}</text><text x="50" y="100" fill="#475569" font-size="11" font-weight="bold" text-anchor="end">10 ${u}</text><text x="198" y="135" fill="#475569" font-size="11" font-weight="bold" text-anchor="start">4 ${u}</text></svg>`;
                    hint = `${difficultyDesc}大魔王周長提示：請先推算出底部總寬為 $4+6=10$ 且凹陷垂直段長度為 $10-4=6$，接著將外圍 6 條邊的長度全部相加。`;
                }

                list.push({ id: i, label, value, unit, svg, hint });
            }
            return list;
        }

        // ==================== 3. 頁面控制與初始化 ====================
        function startApp(topic) {
            currentTopic = topic;
            currentIndex = 0;
            score = 0;
            wrongQuestionsInfo = [];
            
            // 調用隨機出題引擎，洗牌生成 10 題題目 [1]
            activeQuestions = generateQuestions(topic);
            
            document.getElementById('display-score').innerText = score;
            document.getElementById('view-home').classList.add('hidden');
            document.getElementById('view-result').classList.add('hidden');
            document.getElementById('view-exercise').classList.remove('hidden');
            
            renderQuestion();
        }

        function goHome() {
            document.getElementById('view-exercise').classList.add('hidden');
            document.getElementById('view-result').classList.add('hidden');
            document.getElementById('view-home').classList.remove('hidden');
        }

        // ==================== 4. 題目與輸入格渲染 ====================
        function renderQuestion() {
            const q = activeQuestions[currentIndex];
            const qEl = document.getElementById('math-question');
            const svgContainer = document.getElementById('svg-container');
            
            questionScore = 10; // 每題 10 分
            activeInputId = null;
            selectedUnit = '';
            
            document.getElementById('feedback-area').className = "hidden";
            document.getElementById('hint-text-area').className = "hidden";
            document.getElementById('btn-hint').disabled = false;
            document.getElementById('btn-hint').classList.remove('opacity-50', 'cursor-not-allowed');
            document.getElementById('btn-submit').classList.remove('hidden');
            document.getElementById('btn-submit').disabled = true;
            document.getElementById('btn-next').classList.add('hidden');

            if (currentTopic === 'fractions') {
                svgContainer.classList.add('hidden');
                qEl.innerHTML = katex.renderToString(q.latex);
                setupFractionInput(q.template);
            } else if (currentTopic === 'time') {
                svgContainer.classList.add('hidden');
                qEl.innerHTML = q.label;
                if (q.val_type === 'num') {
                    setupNumberInput();
                } else {
                    setupTimeInput(q.val_type);
                }
            } else if (currentTopic === 'geometry') {
                svgContainer.classList.remove('hidden');
                svgContainer.innerHTML = q.svg;
                qEl.innerHTML = q.label;
                setupGeometryInput();
            }

            buildKeyboard();

            document.getElementById('current-step').innerText = currentIndex + 1;
            document.getElementById('progress-bar').style.width = `${(currentIndex + 1) * 10}%`; // 配合 10 題
        }

        function setupFractionInput(template) {
            const zone = document.getElementById('answer-zone');
            zone.innerHTML = `<p class="text-slate-400 text-sm">請點擊下方的分數模板開始作答</p>`;
        }

        function setupTimeInput(valType) {
            const zone = document.getElementById('answer-zone');
            if (valType === 'hm') {
                zone.innerHTML = `
                    <div id="input-h" onclick="focusInput('input-h')" class="w-16 h-12 bg-slate-50 border-2 border-slate-200 rounded-lg flex items-center justify-center text-xl font-bold cursor-pointer transition-all"></div>
                    <span class="text-lg font-bold text-slate-700">時</span>
                    <div id="input-m" onclick="focusInput('input-m')" class="w-16 h-12 bg-slate-50 border-2 border-slate-200 rounded-lg flex items-center justify-center text-xl font-bold cursor-pointer transition-all"></div>
                    <span class="text-lg font-bold text-slate-700">分</span>
                `;
                focusInput('input-h');
            } else if (valType === 'dh') {
                zone.innerHTML = `
                    <div id="input-d" onclick="focusInput('input-d')" class="w-16 h-12 bg-slate-50 border-2 border-slate-200 rounded-lg flex items-center justify-center text-xl font-bold cursor-pointer transition-all"></div>
                    <span class="text-lg font-bold text-slate-700">日</span>
                    <div id="input-h" onclick="focusInput('input-h')" class="w-16 h-12 bg-slate-50 border-2 border-slate-200 rounded-lg flex items-center justify-center text-xl font-bold cursor-pointer transition-all"></div>
                    <span class="text-lg font-bold text-slate-700">時</span>
                `;
                focusInput('input-d');
            } else if (valType === 'ms') {
                zone.innerHTML = `
                    <div id="input-m" onclick="focusInput('input-m')" class="w-16 h-12 bg-slate-50 border-2 border-slate-200 rounded-lg flex items-center justify-center text-xl font-bold cursor-pointer transition-all"></div>
                    <span class="text-lg font-bold text-slate-700">分</span>
                    <div id="input-s" onclick="focusInput('input-s')" class="w-16 h-12 bg-slate-50 border-2 border-slate-200 rounded-lg flex items-center justify-center text-xl font-bold cursor-pointer transition-all"></div>
                    <span class="text-lg font-bold text-slate-700">秒</span>
                `;
                focusInput('input-m');
            }
        }

        function setupNumberInput() {
            const zone = document.getElementById('answer-zone');
            zone.innerHTML = `
                <div id="input-num" onclick="focusInput('input-num')" class="w-24 h-12 bg-slate-50 border-2 border-slate-200 rounded-lg flex items-center justify-center text-xl font-bold cursor-pointer transition-all"></div>
            `;
            focusInput('input-num');
        }

        function setupGeometryInput() {
            const zone = document.getElementById('answer-zone');
            zone.innerHTML = `
                <div id="input-num" onclick="focusInput('input-num')" class="w-24 h-12 bg-slate-50 border-2 border-slate-200 rounded-lg flex items-center justify-center text-xl font-bold cursor-pointer transition-all"></div>
                <div id="unit-display" class="w-16 h-12 border-2 border-indigo-200 bg-indigo-50/50 rounded-lg flex items-center justify-center text-lg font-bold text-indigo-700">--</div>
            `;
            focusInput('input-num');
        }

        // ==================== 5. 焦點輸入控制 ====================
        function focusInput(id) {
            activeInputId = id;
            ['input-whole', 'input-num', 'input-den', 'input-d', 'input-h', 'input-m', 'input-s'].forEach(iId => {
                const el = document.getElementById(iId);
                if (el) {
                    el.classList.remove('border-indigo-500', 'bg-white', 'ring-2', 'ring-indigo-100');
                    el.classList.add('border-slate-200', 'bg-slate-50');
                }
            });
            const activeEl = document.getElementById(id);
            if (activeEl) {
                activeEl.classList.add('border-indigo-500', 'bg-white', 'ring-2', 'ring-indigo-100');
                activeEl.classList.remove('border-slate-200', 'bg-slate-50');
            }
        }

        function pressKey(key) {
            if (key === 'cm' || key === 'm' || key === 'cm²' || key === 'm²') {
                selectedUnit = key;
                const unitDisp = document.getElementById('unit-display');
                if (unitDisp) unitDisp.innerText = key;
                checkSubmitButton();
                return;
            }

            if (!activeInputId) return;
            const target = document.getElementById(activeInputId);
            if (!target) return;

            if (key === 'backspace') {
                target.innerText = target.innerText.slice(0, -1);
            } else if (key === 'clear') {
                target.innerText = '';
            } else {
                if (target.innerText.length < 3) {
                    target.innerText += key;
                }
            }
            checkSubmitButton();
        }

        function applyFractionTemplate(type) {
            const zone = document.getElementById('answer-zone');
            if (type === 'fraction') {
                zone.innerHTML = `
                    <div class="flex flex-col items-center gap-1.5">
                        <div id="input-num" onclick="focusInput('input-num')" class="w-16 h-12 bg-slate-50 border-2 border-slate-200 rounded-lg flex items-center justify-center text-xl font-bold cursor-pointer transition-all"></div>
                        <div class="w-20 h-1 bg-slate-800 rounded"></div>
                        <div id="input-den" onclick="focusInput('input-den')" class="w-16 h-12 bg-slate-50 border-2 border-slate-200 rounded-lg flex items-center justify-center text-xl font-bold cursor-pointer transition-all"></div>
                    </div>
                `;
                focusInput('input-num');
            } else if (type === 'mixed') {
                zone.innerHTML = `
                    <div id="input-whole" onclick="focusInput('input-whole')" class="w-16 h-12 bg-slate-50 border-2 border-slate-200 rounded-lg flex items-center justify-center text-xl font-bold cursor-pointer transition-all mr-2"></div>
                    <div class="flex flex-col items-center gap-1.5">
                        <div id="input-num" onclick="focusInput('input-num')" class="w-16 h-12 bg-slate-50 border-2 border-slate-200 rounded-lg flex items-center justify-center text-xl font-bold cursor-pointer transition-all"></div>
                        <div class="w-20 h-1 bg-slate-800 rounded"></div>
                        <div id="input-den" onclick="focusInput('input-den')" class="w-16 h-12 bg-slate-50 border-2 border-slate-200 rounded-lg flex items-center justify-center text-xl font-bold cursor-pointer transition-all"></div>
                    </div>
                `;
                focusInput('input-whole');
            }
            checkSubmitButton();
        }

        function checkSubmitButton() {
            let isValid = false;
            
            if (currentTopic === 'fractions') {
                const num = document.getElementById('input-num')?.innerText;
                const den = document.getElementById('input-den')?.innerText;
                const whole = document.getElementById('input-whole')?.innerText;
                const hasWhole = document.getElementById('input-whole');
                if (hasWhole) {
                    isValid = whole && num && den && den !== '0';
                } else {
                    isValid = num && den && den !== '0';
                }
            } else if (currentTopic === 'time') {
                const q = activeQuestions[currentIndex];
                if (q.val_type === 'num') {
                    isValid = document.getElementById('input-num')?.innerText !== '';
                } else {
                    const d = document.getElementById('input-d')?.innerText;
                    const h = document.getElementById('input-h')?.innerText;
                    const m = document.getElementById('input-m')?.innerText;
                    const s = document.getElementById('input-s')?.innerText;
                    if (q.val_type === 'hm') isValid = h && m;
                    if (q.val_type === 'dh') isValid = d && h;
                    if (q.val_type === 'ms') isValid = m && s;
                }
            } else if (currentTopic === 'geometry') {
                const num = document.getElementById('input-num')?.innerText;
                isValid = num && selectedUnit !== '';
            }

            document.getElementById('btn-submit').disabled = !isValid;
        }

        // ==================== 6. 鍵盤動態生成 ====================
        function buildKeyboard() {
            const container = document.getElementById('keyboard-container');
            container.innerHTML = '';

            let upperRowHTML = '';
            if (currentTopic === 'fractions') {
                upperRowHTML = `
                    <button onclick="applyFractionTemplate('fraction')" class="col-span-2 bg-white hover:bg-slate-50 text-slate-700 font-bold py-3 rounded-xl border border-slate-200 shadow-sm text-xs flex justify-center items-center gap-1">
                        分模 $\\frac{\\square}{\\square}$
                    </button>
                    <button onclick="applyFractionTemplate('mixed')" class="col-span-2 bg-white hover:bg-slate-50 text-slate-700 font-bold py-3 rounded-xl border border-slate-200 shadow-sm text-xs flex justify-center items-center gap-1">
                        帶模 $\\square\\frac{\\square}{\\square}$
                    </button>
                `;
            } else if (currentTopic === 'geometry') {
                upperRowHTML = `
                    <button onclick="pressKey('cm')" class="bg-indigo-50 hover:bg-indigo-100 text-indigo-700 font-bold py-2.5 rounded-lg border border-indigo-100 shadow-sm text-sm">cm</button>
                    <button onclick="pressKey('m')" class="bg-indigo-50 hover:bg-indigo-100 text-indigo-700 font-bold py-2.5 rounded-lg border border-indigo-100 shadow-sm text-sm">m</button>
                    <button onclick="pressKey('cm²')" class="bg-indigo-50 hover:bg-indigo-100 text-indigo-700 font-bold py-2.5 rounded-lg border border-indigo-100 shadow-sm text-sm">cm²</button>
                    <button onclick="pressKey('m²')" class="bg-indigo-50 hover:bg-indigo-100 text-indigo-700 font-bold py-2.5 rounded-lg border border-indigo-100 shadow-sm text-sm">m²</button>
                `;
            }

            const numbersGridHTML = `
                <div class="grid grid-cols-4 gap-1.5 mt-2">
                    <button onclick="pressKey('1')" class="bg-white hover:bg-slate-50 text-slate-800 font-semibold py-3 rounded-lg border border-slate-200 shadow-sm">1</button>
                    <button onclick="pressKey('2')" class="bg-white hover:bg-slate-50 text-slate-800 font-semibold py-3 rounded-lg border border-slate-200 shadow-sm">2</button>
                    <button onclick="pressKey('3')" class="bg-white hover:bg-slate-50 text-slate-800 font-semibold py-3 rounded-lg border border-slate-200 shadow-sm">3</button>
                    <button onclick="pressKey('backspace')" class="bg-rose-50 hover:bg-rose-100 text-rose-600 font-semibold py-3 rounded-lg border border-rose-100 shadow-sm text-sm">退格</button>

                    <button onclick="pressKey('4')" class="bg-white hover:bg-slate-50 text-slate-800 font-semibold py-3 rounded-lg border border-slate-200 shadow-sm">4</button>
                    <button onclick="pressKey('5')" class="bg-white hover:bg-slate-50 text-slate-800 font-semibold py-3 rounded-lg border border-slate-200 shadow-sm">5</button>
                    <button onclick="pressKey('6')" class="bg-white hover:bg-slate-50 text-slate-800 font-semibold py-3 rounded-lg border border-slate-200 shadow-sm">6</button>
                    <button onclick="pressKey('clear')" class="bg-slate-200 hover:bg-slate-300 text-slate-600 font-semibold py-3 rounded-lg border border-slate-300 shadow-sm text-sm">清除</button>

                    <button onclick="pressKey('7')" class="bg-white hover:bg-slate-50 text-slate-800 font-semibold py-3 rounded-lg border border-slate-200 shadow-sm">7</button>
                    <button onclick="pressKey('8')" class="bg-white hover:bg-slate-50 text-slate-800 font-semibold py-3 rounded-lg border border-slate-200 shadow-sm">8</button>
                    <button onclick="pressKey('9')" class="bg-white hover:bg-slate-50 text-slate-800 font-semibold py-3 rounded-lg border border-slate-200 shadow-sm">9</button>
                    <button onclick="pressKey('0')" class="bg-white hover:bg-slate-50 text-slate-800 font-semibold py-3 rounded-lg border border-slate-200 shadow-sm">0</button>
                </div>
            `;

            container.innerHTML = `
                <div class="grid grid-cols-4 gap-1.5">${upperRowHTML}</div>
                ${numbersGridHTML}
            `;

            setTimeout(() => {
                container.querySelectorAll('button').forEach(btn => {
                    if (btn.innerHTML.includes('$')) {
                        btn.innerHTML = btn.innerHTML.replace(/\$(.*?)\$/g, (m, code) => katex.renderToString(code));
                    }
                });
            }, 50);
        }

        // ==================== 7. 鷹架提示機制 ====================
        function useHint() {
            questionScore = Math.max(0, questionScore - 3); // 提示改扣 3 分 (該題得 7 分)
            
            const q = activeQuestions[currentIndex];
            const hintArea = document.getElementById('hint-text-area');
            
            hintArea.innerHTML = q.hint.replace(/\$\$(.*?)\$\$/g, (m, code) => katex.renderToString(code, { displayMode: true }));
            hintArea.classList.remove('hidden');

            const hintBtn = document.getElementById('btn-hint');
            hintBtn.disabled = true;
            hintBtn.classList.add('opacity-50', 'cursor-not-allowed');
        }

        // ==================== 8. 作答判定與診斷邏輯 ====================
        function submitAnswer() {
            const feedback = document.getElementById('feedback-area');
            feedback.classList.remove('hidden');
            let isCorrect = false;
            let diagnosticMsg = "";
            let tag = ""; 

            if (currentTopic === 'fractions') {
                const num = parseInt(document.getElementById('input-num').innerText) || 0;
                const den = parseInt(document.getElementById('input-den').innerText) || 1;
                const whole = parseInt(document.getElementById('input-whole')?.innerText) || 0;

                const isMixed = document.getElementById('input-whole');
                if (isMixed && num >= den) {
                    isCorrect = false;
                    tag = "帶分數格式防呆";
                    diagnosticMsg = "帶分數的分數部分必須是真分數喔！你的分子不能比分母大，請重新整理你的答案。";
                } else {
                    const studentValue = whole + (num / den);
                    const correctValue = activeQuestions[currentIndex].value;
                    isCorrect = Math.abs(studentValue - correctValue) < 0.0001;

                    if (!isCorrect) {
                        tag = isMixed ? "帶分數退位借位" : "分數通分觀念";
                    }
                }

            } else if (currentTopic === 'time') {
                const q = activeQuestions[currentIndex];
                
                if (q.val_type === 'num') {
                    const numVal = parseInt(document.getElementById('input-num').innerText) || 0;
                    isCorrect = numVal === q.correct.val;
                    if (!isCorrect) tag = "時間單位換算";
                } else {
                    const d = parseInt(document.getElementById('input-d')?.innerText) || 0;
                    const h = parseInt(document.getElementById('input-h')?.innerText) || 0;
                    const m = parseInt(document.getElementById('input-m')?.innerText) || 0;
                    const s = parseInt(document.getElementById('input-s')?.innerText) || 0;

                    // 規格進位預檢防呆
                    if (q.val_type === 'hm' && m >= 60) {
                        isCorrect = false;
                        tag = "60進位規格";
                        diagnosticMsg = "分不能大於或等於 60 喔！請記得每 60 分鐘可以進位為 1 小時。";
                    } else if (q.val_type === 'ms' && s >= 60) {
                        isCorrect = false;
                        tag = "60進位規格";
                        diagnosticMsg = "秒不能大於或等於 60 喔！請記得每 60 秒可以進位為 1 分鐘。";
                    } else if (q.val_type === 'dh' && h >= 24) {
                        isCorrect = false;
                        tag = "24進位規格";
                        diagnosticMsg = "小時不能大於或等於 24 喔！請記得每 24 小時可以進位為 1 天。";
                    } else {
                        if (q.val_type === 'hm') {
                            const studentMinutes = h * 60 + m;
                            const correctMinutes = q.correct.h * 60 + q.correct.m;
                            isCorrect = studentMinutes === correctMinutes;

                            if (!isCorrect) {
                                tag = q.type === 'cross-noon' ? "跨午前午後計算" : "時分退位借位";
                                
                                // 時分退位十進位診斷
                                if (q.type === 'sub-hm') {
                                    const decimalBorrowedH = q.h1_raw - 1 - q.h2_raw;
                                    const decimalBorrowedM = q.m1_raw + 100 - q.m2_raw;
                                    if (h === decimalBorrowedH && m === decimalBorrowedM) {
                                        diagnosticMsg = "診斷分析：你是不是在向「小時」借位時，不小心借了 100 分鐘呢？請記住，1 小時是 60 分鐘，而不是 100 分鐘喔！";
                                    }
                                }
                            }
                        } else if (q.val_type === 'dh') {
                            const studentHours = d * 24 + h;
                            const correctHours = q.correct.d * 24 + q.correct.h;
                            isCorrect = studentHours === correctHours;

                            if (!isCorrect) {
                                tag = "日時24進退位";
                                
                                // 日時退位十進位診斷
                                if (q.type === 'sub-dh') {
                                    const decimalBorrowed10_H = q.h1_raw + 10 - q.h2_raw;
                                    const decimalBorrowed100_H = q.h1_raw + 100 - q.h2_raw;
                                    const ansD = q.d1_raw - 1 - q.d2_raw;
                                    
                                    if (d === ansD && h === decimalBorrowed10_H) {
                                        diagnosticMsg = "診斷分析：你是不是在向「天」借位時，不小心只借了 10 個小時呢？請記得 1 天是 24 小時喔！";
                                    } else if (d === ansD && h === decimalBorrowed100_H) {
                                        diagnosticMsg = "診斷分析：你是不是在向「天」借位時，不小心借了 100 個小時呢？請記住，1 天是 24 小時，不是 100 小時喔！";
                                    }
                                }
                            }
                        } else if (q.val_type === 'ms') {
                            const studentSeconds = m * 60 + s;
                            const correctSeconds = q.correct.m * 60 + q.correct.s;
                            isCorrect = studentSeconds === correctSeconds;
                            if (!isCorrect) tag = "分秒60進位";
                        }
                    }
                }

            } else if (currentTopic === 'geometry') {
                const q = activeQuestions[currentIndex];
                const inputNum = parseInt(document.getElementById('input-num').innerText) || 0;

                const isArea = q.label.includes("面積");
                const isPerimeter = q.label.includes("周長");
                
                if (inputNum === q.value && selectedUnit === q.unit) {
                    isCorrect = true;
                } else if (inputNum === q.value && selectedUnit !== q.unit) {
                    isCorrect = false;
                    tag = "周長與面積單位混淆";
                    diagnosticMsg = `計算數值正確，但單位不對喔！請特別注意「周長」要搭配長度單位 (${q.unit === 'm²' ? 'm' : 'cm'})，而「面積」則要搭配平方單位 (${q.unit})。`;
                } else {
                    isCorrect = false;
                    if (isArea) {
                        tag = q.label.includes("複合") ? "複合圖形面積求法" : "基礎面積公式";
                    } else if (isPerimeter) {
                        tag = q.label.includes("複合") ? "隱藏邊與複合周長" : "基礎周長公式";
                    }
                }
            }

            if (isCorrect) {
                feedback.className = "rounded-xl p-4 mb-4 text-center text-sm font-semibold bg-emerald-50 border border-emerald-100 text-emerald-800";
                feedback.innerText = `答對了！恭喜獲得 ${questionScore} 分。`;
                score += questionScore;
                document.getElementById('display-score').innerText = score;
            } else {
                feedback.className = "rounded-xl p-4 mb-4 text-left text-sm font-semibold bg-rose-50 border border-rose-100 text-rose-800";
                feedback.innerHTML = `<strong>答錯了！</strong><br>${diagnosticMsg || "請再仔細檢查一下你的算式和進退位是否正確。"}`;
                
                wrongQuestionsInfo.push({
                    topicLabel: currentTopic === 'fractions' ? '分數題' : (currentTopic === 'time' ? '時間題' : '幾何題'),
                    index: currentIndex + 1,
                    tag: tag || "基礎計算觀念",
                    desc: diagnosticMsg || "計算不夠精準，需加強通分、單位或進退位邏輯。"
                });
            }

            document.getElementById('btn-submit').classList.add('hidden');
            document.getElementById('btn-next').classList.remove('hidden');
            document.getElementById('btn-hint').disabled = true;
            document.getElementById('btn-hint').classList.add('opacity-50', 'cursor-not-allowed');

            ['input-whole', 'input-num', 'input-den', 'input-d', 'input-h', 'input-m', 'input-s'].forEach(id => {
                const el = document.getElementById(id);
                if (el) el.onclick = null;
            });
            activeInputId = null;
        }

        // ==================== 9. 下一題與結果結算 ====================
        function nextQuestion() {
            if (currentIndex < 9) { // 配合 10 題
                currentIndex++;
                renderQuestion();
            } else {
                document.getElementById('view-exercise').classList.add('hidden');
                document.getElementById('view-result').classList.remove('hidden');
                
                const finalScore = Math.max(0, score);
                document.getElementById('final-score').innerText = finalScore;

                const diagBox = document.getElementById('diagnostic-box');
                const diagList = document.getElementById('diagnostic-list');
                
                if (wrongQuestionsInfo.length > 0) {
                    diagBox.classList.remove('hidden');
                    diagList.innerHTML = '';
                    wrongQuestionsInfo.forEach(item => {
                        const row = document.createElement('div');
                        row.className = "bg-slate-50 border border-slate-100 rounded-lg p-3 text-xs leading-relaxed text-slate-700";
                        row.innerHTML = `<span class="font-bold text-rose-600">[第 ${item.index} 題 - ${item.topicLabel}] (${item.tag})</span> ${item.desc}`;
                        diagList.appendChild(row);
                    });
                } else {
                    diagBox.classList.add('hidden');
                }
            }
        }
    </script>
