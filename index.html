<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>國小數學即時練習平台</title>
    <!-- 引入 Tailwind CSS 用於自適應排版 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 KaTeX 用於渲染 LaTeX 數學公式 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    
    <!-- 引入 Firebase SDK 核心與資料庫服務 -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <!-- 方案 A: 紅圈與綠叉手寫動畫 CSS -->
    <style>
        @keyframes drawStroke {
            to { stroke-dashoffset: 0; }
        }
        .animate-draw {
            animation: drawStroke 0.6s ease-out forwards;
        }
        .animate-draw-delay {
            animation: drawStroke 0.4s ease-out 0.3s forwards;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col justify-between p-4 font-sans select-none relative">

    <!-- ==================== 方案 A: 即時半透明批改遮罩 ==================== -->
    <div id="correct-wrong-overlay" class="hidden fixed inset-0 bg-slate-900/40 z-50 flex items-center justify-center transition-opacity duration-500 opacity-0">
        <!-- 答對：直徑約 5 公分 (180px) 紅圈 -->
        <svg id="svg-correct" class="hidden w-44 h-44" viewBox="0 0 100 100">
            <circle cx="50" cy="50" r="40" stroke="#ef4444" stroke-width="8" fill="none" stroke-linecap="round" stroke-dasharray="251.2" stroke-dashoffset="251.2" class="animate-draw" />
        </svg>
        <!-- 答錯：長度約 4 公分 (145px) 綠叉 -->
        <svg id="svg-incorrect" class="hidden w-36 h-36" viewBox="0 0 100 100">
            <line x1="20" y1="20" x2="80" y2="80" stroke="#22c55e" stroke-width="10" stroke-linecap="round" stroke-dasharray="85" stroke-dashoffset="85" class="animate-draw" />
            <line x1="80" y1="20" x2="20" y2="80" stroke="#22c55e" stroke-width="10" stroke-linecap="round" stroke-dasharray="85" stroke-dashoffset="85" class="animate-draw-delay" />
        </svg>
    </div>

    <!-- 主容器 -->
    <div class="max-w-md w-full mx-auto bg-white rounded-2xl shadow-sm border border-slate-100 p-6 flex-grow flex flex-col justify-between">
        
        <!-- ==================== 頁面一：主題選擇與登入首頁 (唯一入口) ==================== -->
        <div id="view-home" class="flex flex-col justify-center items-center h-full my-auto py-4">
            <span class="text-5xl mb-4">🏫</span>
            <h1 class="text-2xl font-bold text-slate-800 mb-1">國小數學即時練習平台</h1>
            <p class="text-xs text-slate-400 mb-5 text-center font-medium">請選擇您的身份、名字，並選擇要挑戰的單元 (共 10 題)</p>
            
            <!-- 身分選擇單選鈕 -->
            <div class="w-full flex gap-4 mb-4 justify-center text-sm font-bold text-slate-600">
                <label class="flex items-center gap-1.5 cursor-pointer">
                    <input type="radio" name="user-role" id="role-student" checked onchange="toggleRoleSelection()" class="w-4 h-4 text-indigo-600 focus:ring-indigo-500">
                    👨‍🎓 班級學生
                </label>
                <label class="flex items-center gap-1.5 cursor-pointer">
                    <input type="radio" name="user-role" id="role-visitor" onchange="toggleRoleSelection()" class="w-4 h-4 text-indigo-600 focus:ring-indigo-500">
                    👥 體驗訪客
                </label>
            </div>

            <!-- 學生姓名下拉式選單 (動態載入名冊) -->
            <div id="student-roster-box" class="w-full mb-6">
                <select id="student-roster-select" onchange="checkLoginInput()" class="w-full px-4 py-3.5 rounded-xl border-2 border-slate-200 text-center text-sm font-bold focus:outline-none focus:border-indigo-500 transition-all text-slate-700 bg-white">
                    <option value="">-- 請選擇您的姓名與座號 --</option>
                </select>
            </div>

            <!-- 訪客輸入框 (預設隱藏) -->
            <div id="visitor-input-box" class="w-full mb-6 hidden">
                <input id="student-name-input" oninput="checkLoginInput()" type="text" placeholder="請輸入您的暱稱" class="w-full px-4 py-3.5 rounded-xl border-2 border-slate-200 text-center text-sm font-bold focus:outline-none focus:border-indigo-500 transition-all placeholder:text-slate-300">
            </div>

            <!-- 兩大年級分流卡片 -->
            <div class="w-full grid grid-cols-2 gap-4 mb-6">
                <button id="btn-grade4" onclick="selectGrade('4')" class="py-4 rounded-xl font-bold text-sm shadow-sm transition-all border opacity-50 cursor-not-allowed bg-slate-100 text-slate-400 border-slate-200" disabled>
                    📘 四年級單元
                </button>
                <button id="btn-grade5" onclick="selectGrade('5')" class="py-4 rounded-xl font-bold text-sm shadow-sm transition-all border opacity-50 cursor-not-allowed bg-slate-100 text-slate-400 border-slate-200" disabled>
                    📙 五年級單元
                </button>
            </div>

            <!-- 四年級單元選單 -->
            <div id="menu-grade4" class="hidden w-full flex flex-col gap-3">
                <button onclick="startApp('time')" class="w-full bg-gradient-to-r from-amber-500 to-amber-600 hover:from-amber-600 hover:to-amber-700 text-white font-bold py-3.5 px-6 rounded-xl shadow-md shadow-amber-50 transition-all flex justify-between items-center text-sm">
                    <span>🔵 時間的計算 (四年級)</span>
                    <span class="text-base">➔</span>
                </button>
                <button onclick="startApp('geometry')" class="w-full bg-gradient-to-r from-emerald-500 to-emerald-600 hover:from-emerald-600 hover:to-emerald-700 text-white font-bold py-3.5 px-6 rounded-xl shadow-md shadow-emerald-50 transition-all flex justify-between items-center text-sm">
                    <span>🟢 周長與面積 (四年級)</span>
                    <span class="text-base">➔</span>
                </button>
            </div>

            <!-- 五年級 10 大單元選單 -->
            <div id="menu-grade5" class="hidden w-full grid grid-cols-2 gap-3 text-xs">
                <button onclick="startApp('line_graphs')" class="bg-indigo-50 border border-indigo-100 text-indigo-700 font-bold py-3 px-2 rounded-xl hover:bg-indigo-100 transition-all text-center">1. 折線圖</button>
                <button onclick="startApp('factors')" class="bg-indigo-50 border border-indigo-100 text-indigo-700 font-bold py-3 px-2 rounded-xl hover:bg-indigo-100 transition-all text-center">2. 因數與倍數</button>
                <button onclick="startApp('shapes_2d')" class="bg-indigo-50 border border-indigo-100 text-indigo-700 font-bold py-3 px-2 rounded-xl hover:bg-indigo-100 transition-all text-center">3. 平面圖形</button>
                <button onclick="startApp('common_factors')" class="bg-indigo-50 border border-indigo-100 text-indigo-700 font-bold py-3 px-2 rounded-xl hover:bg-indigo-100 transition-all text-center">4. 公因數與公倍數</button>
                <button onclick="startApp('shapes_3d')" class="bg-indigo-50 border border-indigo-100 text-indigo-700 font-bold py-3 px-2 rounded-xl hover:bg-indigo-100 transition-all text-center">5. 立體形體</button>
                <button onclick="startApp('four_operations')" class="bg-indigo-50 border border-indigo-100 text-indigo-700 font-bold py-3 px-2 rounded-xl hover:bg-indigo-100 transition-all text-center">6. 四則運算</button>
                <button onclick="startApp('fractions')" class="bg-indigo-50 border border-indigo-100 text-indigo-700 font-bold py-3 px-2 rounded-xl hover:bg-indigo-100 transition-all text-center">7. 擴分與約分</button>
                <button onclick="startApp('area_5')" class="bg-indigo-50 border border-indigo-100 text-indigo-700 font-bold py-3 px-2 rounded-xl hover:bg-indigo-100 transition-all text-center">8. 面積</button>
                <button onclick="startApp('fraction_mult')" class="bg-indigo-50 border border-indigo-100 text-indigo-700 font-bold py-3 px-2 rounded-xl hover:bg-indigo-100 transition-all text-center">9. 乘以幾分之幾</button>
                <button onclick="startApp('sectors')" class="bg-indigo-50 border border-indigo-100 text-indigo-700 font-bold py-3 px-2 rounded-xl hover:bg-indigo-100 transition-all text-center">10. 扇形</button>
            </div>
        </div>

        <!-- ==================== 頁面二：練習與作答頁面 ==================== -->
        <div id="view-exercise" class="hidden flex-grow flex flex-col justify-between">
            <!-- 上方進度與得分 -->
            <div>
                <div class="flex justify-between items-center mb-2">
                    <button onclick="goHome()" class="text-xs font-bold text-indigo-600 hover:text-indigo-800 flex items-center gap-1">◀ 返回選單</button>
                    <span class="text-xs font-semibold text-slate-400">進度：<span id="current-step">1</span> / 10</span>
                    <span class="text-xs font-semibold text-indigo-600">目前得分：<span id="display-score">0</span> 分</span>
                </div>
                <!-- 進度條 -->
                <div class="w-full bg-slate-100 h-2 rounded-full mb-4">
                    <div id="progress-bar" class="bg-indigo-600 h-2 rounded-full transition-all duration-300" style="width: 10%"></div>
                </div>

                <!-- 題目顯示區 -->
                <div class="bg-slate-50 rounded-xl p-4 text-center mb-4 min-h-[80px] flex flex-col items-center justify-center border border-dashed border-slate-200">
                    <div id="math-question" class="text-base text-slate-800 font-semibold">載入中...</div>
                </div>

                <!-- 幾何/折線圖 SVG 渲染區 -->
                <div id="svg-container" class="hidden bg-white border border-slate-100 rounded-xl p-4 mb-4 flex justify-center items-center">
                    <!-- SVG 動態插入在這裡 -->
                </div>

                <!-- 答案輸入區 -->
                <div class="flex justify-center items-center gap-2 mb-4 min-h-[100px] bg-slate-50/50 rounded-xl p-2 border border-slate-100" id="answer-zone">
                    <!-- 答案輸入格會動態插入在這裡 -->
                </div>

                <!-- 提示與診斷反饋區 -->
                <div id="feedback-area" class="hidden rounded-xl p-4 mb-4 text-center text-sm font-semibold"></div>
                <div id="hint-text-area" class="hidden bg-amber-50 border border-amber-100 text-amber-800 rounded-xl p-4 mb-4 text-sm leading-relaxed font-normal"></div>
            </div>

            <!-- 下方：操作按鈕與虛擬鍵盤 -->
            <div>
                <!-- 功能按鈕 -->
                <div class="flex gap-3 mb-4">
                    <button id="btn-hint" onclick="useHint()" class="flex-1 bg-amber-500 hover:bg-amber-600 text-white font-medium py-3 px-4 rounded-xl shadow-sm transition-colors text-xs flex justify-center items-center gap-1">
                        💡 提示 (扣3分)
                    </button>
                    <button id="btn-submit" onclick="submitAnswer()" class="flex-grow-[2] bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 px-6 rounded-xl shadow-sm transition-colors text-sm" disabled>
                        送出答案
                    </button>
                    <button id="btn-next" onclick="nextQuestion()" class="hidden flex-grow-[2] bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-3 px-6 rounded-xl shadow-sm transition-colors text-sm">
                        下一題
                    </button>
                </div>

                <!-- 動態變形虛擬鍵盤區 -->
                <div id="keyboard-container" class="bg-slate-100 rounded-2xl p-3">
                    <!-- 鍵盤按鈕由 JS 根據單元動態生成 -->
                </div>
            </div>
        </div>

        <!-- ==================== 頁面三：結算頁面 ==================== -->
        <div id="view-result" class="hidden text-center py-8 my-auto">
            <span class="text-6xl">🎉</span>
            <h2 class="text-2xl font-bold text-slate-800 mt-6">挑戰結束！</h2>
            <p class="text-slate-500 mt-2">太棒了，你已經完成了所有練習！</p>
            
            <div class="my-6 bg-indigo-50 rounded-2xl p-6 border border-indigo-100 inline-block w-full">
                <span class="text-slate-600 block text-sm">最終結算總分</span>
                <span class="text-5xl font-black text-indigo-600"><span id="final-score">0</span> <span class="text-xl">分</span></span>
            </div>

            <!-- 錯題知識點診斷清單 -->
            <div id="diagnostic-box" class="hidden text-left mb-6">
                <h3 class="text-sm font-bold text-slate-500 mb-3">📋 錯題觀念診斷分析：</h3>
                <div id="diagnostic-list" class="flex flex-col gap-3"></div>
            </div>

            <button onclick="goHome()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-4 px-6 rounded-xl shadow-md transition-colors">
                返回主選單
            </button>
        </div>

    </div>

    <!-- 腳本邏輯 -->
    <script>
        // ==================== 【串接 Firebase】專屬憑證區 ====================
        const firebaseConfig = {
            apiKey: "AIzaSyBAts0U7r9bACQYx1w_plAlH1LrPrxLW7c",
  authDomain: "math-practice-system.firebaseapp.com",
  projectId: "math-practice-system",
  storageBucket: "math-practice-system.firebasestorage.app",
  messagingSenderId: "192907879246",
  appId: "1:192907879246:web:0194c98122228cbbc0741f",
  measurementId: "G-9QYCJT2CW3"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // ==================== 全域變數狀態 ====================
        let studentName = ""; 
        let studentRole = "student"; // student 或 visitor [1]
        let currentTopic = '';
        let currentIndex = 0;
        let score = 0;
        let questionScore = 10; 
        let activeInputId = null;
        let selectedUnit = ''; 
        let wrongQuestionsInfo = []; 
        let activeQuestions = []; 

        function getGCD(a, b) {
            return b ? getGCD(b, a % b) : a;
        }
        function getLCM(a, b) {
            return (a * b) / getGCD(a, b);
        }

        // 🛠️ 通用 LaTeX 解析函式 [1]
        function parseMath(text) {
            if (!text) return "";
            let temp = text.replace(/\$\$(.*?)\$\$/g, (match, g1) => {
                return katex.renderToString(g1, { displayMode: true });
            });
            return temp.replace(/\$(.*?)\$/g, (match, g1) => {
                return katex.renderToString(g1, { displayMode: false });
            });
        }

        // ==================== 1. 名冊與身份分流載入邏輯 ====================
        window.onload = function() {
            loadClassRoster();
        };

        function toggleRoleSelection() {
            const isStudent = document.getElementById('role-student').checked;
            const rosterBox = document.getElementById('student-roster-box');
            const visitorBox = document.getElementById('visitor-input-box');

            if (isStudent) {
                studentRole = "student";
                rosterBox.classList.remove('hidden');
                visitorBox.classList.add('hidden');
            } else {
                studentRole = "visitor";
                rosterBox.classList.add('hidden');
                visitorBox.classList.remove('hidden');
            }
            checkLoginInput();
        }

        function loadClassRoster() {
            const selectEl = document.getElementById('student-roster-select');
            selectEl.innerHTML = '<option value="">-- 請選擇您的姓名與座號 --</option>';

            const defaultRoster = ["01號 王小明", "02號 李美美", "03號 張大同", "04號 許大華", "05號 陳阿亮"];

            if (db) {
                db.collection("class_roster").orderBy("seat", "asc").get().then((querySnapshot) => {
                    if (querySnapshot.empty) {
                        useDefaultRoster(defaultRoster, selectEl);
                    } else {
                        querySnapshot.forEach((doc) => {
                            const student = doc.data();
                            const option = document.createElement('option');
                            const displayName = `${student.seat.toString().padStart(2, '0')}號 ${student.name}`;
                            option.value = displayName;
                            option.innerText = displayName;
                            selectEl.appendChild(option);
                        });
                    }
                }).catch(err => {
                    console.log("Firebase名冊加載失敗，使用預設模擬名冊: ", err);
                    useDefaultRoster(defaultRoster, selectEl);
                });
            } else {
                useDefaultRoster(defaultRoster, selectEl);
            }
        }

        function useDefaultRoster(roster, selectEl) {
            roster.forEach(name => {
                const option = document.createElement('option');
                option.value = name;
                option.innerText = name;
                selectEl.appendChild(option);
            });
        }

        function checkLoginInput() {
            const btn4 = document.getElementById('btn-grade4');
            const btn5 = document.getElementById('btn-grade5');
            let isFilled = false;

            if (studentRole === "student") {
                const selectVal = document.getElementById('student-roster-select').value;
                isFilled = selectVal !== "";
                studentName = selectVal;
            } else {
                // 排除重疊 ID 衝突 [1]
                const nameInput = document.getElementById('student-name-input');
                const nameVal = nameInput ? nameInput.value.trim() : "";
                isFilled = nameVal !== "";
                studentName = nameVal;
            }

            if (isFilled) {
                btn4.disabled = false;
                btn4.className = "py-4 rounded-xl font-bold text-sm shadow-sm transition-all border bg-blue-50 text-blue-700 border-blue-200 hover:bg-blue-100 hover:scale-[1.02] cursor-pointer";
                btn5.disabled = false;
                btn5.className = "py-4 rounded-xl font-bold text-sm shadow-sm transition-all border bg-orange-50 text-orange-700 border-orange-200 hover:bg-orange-100 hover:scale-[1.02] cursor-pointer";
            } else {
                btn4.disabled = true;
                btn4.className = "py-4 rounded-xl font-bold text-sm shadow-sm transition-all border opacity-50 cursor-not-allowed bg-slate-100 text-slate-400 border-slate-200";
                btn5.disabled = true;
                btn5.className = "py-4 rounded-xl font-bold text-sm shadow-sm transition-all border opacity-50 cursor-not-allowed bg-slate-100 text-slate-400 border-slate-200";
                document.getElementById('menu-grade4').classList.add('hidden');
                document.getElementById('menu-grade5').classList.add('hidden');
            }
        }

        // ==================== 2. 全單元出題引擎路由器 ====================
        function generateQuestions(topic) {
            if (topic === 'fractions') return generateFractionsQuestions();
            if (topic === 'time') return generateTimeQuestions();
            if (topic === 'geometry') return generateGeometryQuestions();
            if (topic === 'factors') return generateFactorsQuestions();
            if (topic === 'line_graphs') return generateLineGraphsQuestions();
            if (topic === 'shapes_2d') return generateShapes2DQuestions();
            if (topic === 'common_factors') return generateCommonFactorsQuestions();
            if (topic === 'shapes_3d') return generateShapes3DQuestions();
            if (topic === 'four_operations') return generateFourOperationsQuestions();
            if (topic === 'area_5') return generateArea5Questions();
            if (topic === 'fraction_mult') return generateFractionMultQuestions();
            if (topic === 'sectors') return generateSectorsQuestions();
        }

        function generateFractionsQuestions() {
            const list = [];
            const denominators = [2, 3, 4, 5, 6, 8, 9];
            for (let i = 1; i <= 10; i++) {
                let d1, d2, n1, n2, w1 = 0, w2 = 0, isAddition = true, template = 'fraction';
                let diffTag = i <= 5 ? "【基本題】" : "【挑戰題】";
                
                if (i <= 2) {
                    d1 = Math.random() > 0.5 ? 2 : 3; d2 = d1 * 2; n1 = 1; n2 = 1; isAddition = Math.random() > 0.5;
                } else if (i <= 5) {
                    d1 = denominators[Math.floor(Math.random() * denominators.length)];
                    d2 = d1; while (d2 === d1) d2 = denominators[Math.floor(Math.random() * denominators.length)];
                    n1 = Math.floor(Math.random() * (d1 - 1)) + 1; n2 = Math.floor(Math.random() * (d2 - 1)) + 1;
                    isAddition = Math.random() > 0.5;
                } else if (i === 6) {
                    d1 = denominators[Math.floor(Math.random() * denominators.length)];
                    d2 = d1; while (d2 === d1) d2 = denominators[Math.floor(Math.random() * denominators.length)];
                    n1 = Math.floor(Math.random() * d1) + d1 + 1; n2 = Math.floor(Math.random() * (d2 - 1)) + 1;
                    isAddition = false;
                } else if (i === 7) {
                    d1 = 3; d2 = 4; n1 = 2; n2 = 3; w1 = Math.floor(Math.random() * 2) + 1; w2 = Math.floor(Math.random() * 2) + 1;
                    isAddition = true; template = 'mixed';
                } else if (i === 8) {
                    d1 = 3; d2 = 2; n1 = 1; n2 = 1; w1 = 3; w2 = 1; isAddition = false; template = 'mixed';
                } else if (i === 9) {
                    d1 = 4; d2 = 3; n1 = 1; n2 = 2; w1 = 2; w2 = 0; isAddition = false; template = 'mixed';
                } else if (i === 10) {
                    d1 = 7; d2 = 8; n1 = 2; n2 = 3; w1 = 4; w2 = 1; isAddition = false; template = 'mixed';
                }

                let v1 = w1 + n1/d1; let v2 = w2 + n2/d2;
                if (!isAddition && v1 < v2) {
                    let tempW = w1; w1 = w2; w2 = tempW;
                    let tempN = n1; n1 = n2; n2 = tempN;
                    let tempD = d1; d1 = d2; d2 = tempD;
                    v1 = w1 + n1/d1; v2 = w2 + n2/d2;
                }

                const val = isAddition ? (v1 + v2) : (v1 - v2);
                const op = isAddition ? "+" : "-";
                const part1 = w1 > 0 ? `${w1}\\frac{${n1}}{${d1}}` : `\\frac{${n1}}{${d1}}`;
                const part2 = w2 > 0 ? `${w2}\\frac{${n2}}{${d2}}` : `\\frac{${n2}}{${d2}}`;
                const latex = `${part1} ${op} ${part2}`;
                const lcm = getLCM(d1, d2);
                
                let hint = `${diffTag}通分提示：分母 ${d1} 和 ${d2} 的最小公倍數是 ${lcm}。請將分母通分為 ${lcm} 再進行加減。`;
                if (i === 7) hint += "分數相加如果大於 1，請記得向整數進位：$$\\frac{17}{12} = 1\\frac{5}{12}$$";
                if (i >= 8) hint += "分數不夠減時，要記得向整數借 1：$$1 = \\frac{6}{6}$$";

                list.push({
                    id: i, latex: latex, value: val, template: template, hint: hint
                });
            }
            return list;
        }

        function generateTimeQuestions() {
            const list = [];
            for (let i = 1; i <= 10; i++) {
                let label = "", type = "", val_type = "", correct = {}, hint = "";
                let diffTag = i <= 5 ? "【基本題】" : "【挑戰題】";

                    label = `算算看：$${a} \\times \\frac{1}{${b}}$ 是多少？（請以最簡分數或帶分數輸入）`;
                    value = a / b; template = "fraction";
                    hint = `${diffTag}提示：整數乘以幾分之一，等同於將整數除以分母：$$a \\times \\frac{1}{b} = \\frac{a}{b}$$`;
                } else {
                    let a = Math.floor(Math.random() * 6) + 5; 
                    let b = 4; let c = 3;
                    label = `算算看：$${a} \\times \\frac{3}{4}$ 是多少？（請用最簡分數或帶分數輸入）`;
                    value = a * c / b; template = "fraction";
                    hint = `${diffTag}提示：整數與分子相乘，分母不變：$$a \\times \\frac{c}{b} = \\frac{a \\times c}{b}$$`;
                }
                list.push({ id: i, label, latex, value, template, hint });
            }
            return list;
        }

        // --- 2.12 扇形與圓心角 (5下第十單元) ---
        function generateSectorsQuestions() {
            const list = [];
            for (let i = 1; i <= 10; i++) {
                let label = "", value = 0, hint = "", template = "num";
                let diffTag = i <= 5 ? "【基本題】" : "【挑戰題】";
                let d = [2, 3, 4, 6, 8, 12][Math.floor(Math.random() * 6)]; 

                if (i <= 4) {
                    label = `一個「$\\frac{1}{${d}}$ 圓」的扇形，圓心角是幾度？`;
                    value = 360 / d;
                    hint = `${diffTag}提示：一圓是 360 度，用 360 度除以分母：$$360 \\div ${d} = \\text{圓心角}$$`;
                } else if (i <= 7) {
                    let angle = 360 / d;
                    label = `一個圓心角是 ${angle} 度的扇形，是「幾分之幾圓」？（請用分數格式，如 1/4）`;
                    value = 1 / d; template = "fraction";
                    hint = `${diffTag}提示：圓心角除以 360 度並約分成最簡分數：$$\\frac{${angle}}{360} = \\frac{1}{${d}}$$`;
                } else {
                    let angle = (360 / d) * 2; 
                    label = `已知圓心角是 ${angle} 度的扇形，它是「幾分之幾圓」？（請以分數格式約分填寫）`;
                    value = angle / 360; template = "fraction";
                    hint = `${diffTag}提示：圓心角除以 360 度：$$\\frac{${angle}}{360} = \\text{約分答案}$$`;
                }
                list.push({ id: i, label, value, template, hint });
            }
            return list;
        }

            questionScore = 10; 
            activeInputId = null;

                }

                // 【放寬長度限制】放寬至 5 位數，以便順利輸入 4 位數簡化計算 [1]

        // ==================== 作答判定與診斷邏輯 ====================
        function submitAnswer() {
            const feedback = document.getElementById('feedback-area');
            feedback.classList.remove('hidden');
            let isCorrect = false;
            let diagnosticMsg = "";
            let tag = ""; 

            const q = activeQuestions[currentIndex];

            if (currentTopic === 'fractions' || (currentTopic === 'fraction_mult' && q.template === 'fraction') || (currentTopic === 'sectors' && q.template === 'fraction')) {
                const num = parseInt(document.getElementById('input-num').innerText) || 0;
                const den = parseInt(document.getElementById('input-den').innerText) || 1;
                const whole = parseInt(document.getElementById('input-whole')?.innerText) || 0;

                const isMixed = document.getElementById('input-whole');
                if (isMixed && num >= den) {
                    isCorrect = false;
                    tag = "帶分數格式防呆";
                    diagnosticMsg = "帶分數的分數部分必須是真分數喔！分子不能比分母大。";
                } else {
                    const studentValue = whole + (num / den);
                    const correctValue = q.value;
                    isCorrect = Math.abs(studentValue - correctValue) < 0.0001;

                    if (!isCorrect) {
                        if (currentTopic === 'fractions') tag = isMixed ? "帶分數退位借位" : "分數通分觀念";
                        if (currentTopic === 'fraction_mult') tag = "分數乘法計算與表示";
                        if (currentTopic === 'sectors') tag = "圓心角與圓比例換算";
                    }
                }

            } else if (currentTopic === 'time') {
                if (q.template === 'num') {
                    const numVal = parseInt(document.getElementById('input-num').innerText) || 0;
                    isCorrect = numVal === q.correct.val;
                    if (!isCorrect) tag = "時間單位換算";
                } else {
                    const d = parseInt(document.getElementById('input-d')?.innerText) || 0;
                    const h = parseInt(document.getElementById('input-h')?.innerText) || 0;
                    const m = parseInt(document.getElementById('input-m')?.innerText) || 0;
                    const s = parseInt(document.getElementById('input-s')?.innerText) || 0;

                    // 規格進位預檢防呆
                    if (q.template === 'hm' && m >= 60) {
                        isCorrect = false;
                        tag = "60進位規格";
                        diagnosticMsg = "分不能大於或等於 60 喔！請記得每 60 分鐘可以進位為 1 小時。";
                    } else if (q.template === 'ms' && s >= 60) {
                        isCorrect = false;
                        tag = "60進位規格";
                        diagnosticMsg = "秒不能大於或等於 60 喔！請記得每 60 秒可以進位為 1 分鐘。";
                    } else if (q.template === 'dh' && h >= 24) {
                        isCorrect = false;
                        tag = "24進位規格";
                        diagnosticMsg = "小時不能大於或等於 24 喔！請記得每 24 小時可以進位為 1 天。";
                    } else {
                        const targetObj = JSON.parse(q.value);
                        if (q.template === 'hm') {
                            const studentMinutes = h * 60 + m;
                            const correctMinutes = targetObj.h * 60 + targetObj.m;
                            isCorrect = studentMinutes === correctMinutes;

                            if (!isCorrect) {
                                tag = q.type === 'cross-noon' ? "跨午時間計算" : "時分退位借位";
                                
                                // 時分退位十進位診斷
                                if (q.type === 'sub-hm-borrow') {
                                    const decimalBorrowedH = q.h1_raw - 1 - q.h2_raw;
                                    const decimalBorrowedM = q.m1_raw + 100 - q.m2_raw;
                                    if (h === decimalBorrowedH && m === decimalBorrowedM) {
                                        diagnosticMsg = "診斷分析：你是不是在向「小時」借位時，不小心借了 100 分鐘呢？請記住，1 小時是 60 分鐘，而不是 100 分鐘喔！";
                                    }
                                }
                            }
                        } else if (q.template === 'dh') {
                            const studentHours = d * 24 + h;
                            const correctHours = targetObj.d * 24 + targetObj.h;
                            isCorrect = studentHours === correctHours;

                            if (!isCorrect) {
                                tag = "日時24進退位";
                                
                                // 日時退位十進位診斷
                                if (q.type === 'sub-dh-borrow') {
                                    const decimalBorrowed10_H = q.h1_raw + 10 - q.h2_raw;
                                    const decimalBorrowed100_H = q.h1_raw + 100 - q.h2_raw;
                                    const ansD = q.d1_raw - 1 - q.d2_raw;
                                    
                                    if (d === ansD && h === decimalBorrowed10_H) {
                                        diagnosticMsg = "診斷分析：你是不是在向「天」借位時，不小心只借了 10 個小時呢？請記得 1 天是 24 小時喔！";
                                    } else if (d === ansD && h === decimalBorrowed100_H) {
                                        diagnosticMsg = "診斷分析：你是不是在向「天」借位時，不小心借了 100 個小時呢？請記住，1 天是 24 小時，不是 100 小時喔！";
                                    }
                                }
                            }
                        } else if (q.template === 'ms') {
                            const studentSeconds = m * 60 + s;
                            const correctSeconds = targetObj.m * 60 + targetObj.s;
                            isCorrect = studentSeconds === correctSeconds;
                            if (!isCorrect) tag = "分秒60進位";
                        }
                    }
                }

            } else if (currentTopic === 'geometry' || currentTopic === 'area_5') {
                const inputNum = parseInt(document.getElementById('input-num').innerText) || 0;
                const isArea = q.label.includes("面積");
                const isPerimeter = q.label.includes("周長");
                
                if (inputNum === q.value && selectedUnit === q.unit) {
                    isCorrect = true;
                } else if (inputNum === q.value && selectedUnit !== q.unit) {
                    isCorrect = false;
                    tag = "周長與面積單位混淆";
                    diagnosticMsg = `計算數值正確，但單位不對喔！請特別注意「周長」要搭配長度單位 (${q.unit === 'm²' ? 'm' : 'cm'})，而「面積」則要搭配平方單位 (${q.unit})。`;
                } else {
                    isCorrect = false;
                    if (isArea) {
                        tag = currentTopic === 'area_5' ? "五角平行四邊三角形梯形面積" : (q.label.includes("複合") ? "複合圖形面積求法" : "基礎面積公式");
                    } else if (isPerimeter) {
                        tag = q.label.includes("複合") ? "隱藏邊與複合周長" : "基礎周長公式";
                    }
                }
            } else {
                const inputNum = parseInt(document.getElementById('input-num').innerText) || 0;
                isCorrect = inputNum === q.value;

                if (!isCorrect) {
                    if (currentTopic === 'factors') {
                        if (q.id === 1) tag = "倍數基礎計算";
                        else if (q.id === 2) tag = "因數基礎計算";
                        else if (q.id === 3 || q.id === 9) tag = "最小公倍數計算";
                        else if (q.id === 4 || q.id === 8) tag = "最大公因數計算";
                        else if (q.id === 5) tag = "質數與因數個數概念";
                        else if (q.id === 6) tag = "最大公因數應用題判斷";
                        else if (q.id === 7) tag = "最小公倍數應用題判斷";
                        else if (q.id === 10) tag = "有餘數的公倍數問題";
                    }
                    if (currentTopic === 'common_factors') {
                        if (q.id === 1) tag = "公因數個數判定";
                        else if (q.id === 2) tag = "次大公因數判讀";
                        else if (q.id === 3 || q.id === 8) tag = "最大公因數計算";
                        else if (q.id === 4 || q.id === 9) tag = "最小公倍數計算";
                        else if (q.id === 5) tag = "公倍數最大範圍計算";
                        else if (q.id === 6) tag = "最大公因數應用題判斷";
                        else if (q.id === 7) tag = "最小公倍數應用題判斷";
                        else if (q.id === 10) tag = "有餘數的公倍數問題";
                    }
                    if (currentTopic === 'line_graphs') tag = "折線圖讀圖與增減分析";
                    if (currentTopic === 'shapes_2d') tag = "三角形內角和與邊長性質";
                    if (currentTopic === 'shapes_3d') tag = "立體形體頂點邊面計數";
                    if (currentTopic === 'four_operations') tag = "四則運算規則與分配律";
                    if (currentTopic === 'sectors') tag = "圓心角與圓比例換算";
                }
            }

            // 【呼叫方案 A 動態批改遮罩】 [1]
            triggerGradeMask(isCorrect);

            if (isCorrect) {
                feedback.className = "rounded-xl p-4 mb-4 text-center text-sm font-semibold bg-emerald-50 border border-emerald-100 text-emerald-800";
                feedback.innerText = `答對了！恭喜獲得 ${questionScore} 分。`;
                score += questionScore;
                document.getElementById('display-score').innerText = score;
            } else {
                feedback.className = "rounded-xl p-4 mb-4 text-left text-sm font-semibold bg-rose-50 border border-rose-100 text-rose-800";
                feedback.innerHTML = `<strong>答錯了！</strong><br>${diagnosticMsg || "請再仔細檢查一下你的算式或觀念是否正確。"}`;
                
                wrongQuestionsInfo.push({
                    topicLabel: activeQuestions[currentIndex].label || currentTopic,
                    index: currentIndex + 1,
                    tag: tag || "基礎計算觀念",
                    desc: diagnosticMsg || "計算不夠精準，需加強通分、單位或進退位邏輯。"
                });
            }

            // 【串接 Firebase】向 Firebase 發送此題作答數據 [1]
            if (db) {
                db.collection("student_submissions").add({
                    student_name: studentName,
                    question_index: currentIndex + 1,
                    is_correct: isCorrect,
                    score: score,
                    tag: tag || "",
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                }).catch(err => console.error("Firebase 寫入失敗: ", err));
            }

            document.getElementById('btn-submit').classList.add('hidden');
            document.getElementById('btn-next').classList.remove('hidden');
            document.getElementById('btn-hint').disabled = true;
            document.getElementById('btn-hint').classList.add('opacity-50', 'cursor-not-allowed');

            ['input-whole', 'input-num', 'input-den', 'input-d', 'input-h', 'input-m', 'input-s'].forEach(id => {
                const el = document.getElementById(id);
                if (el) el.onclick = null;
            });
            activeInputId = null;
        }

        // ==================== 下一題與結果結算 ====================
        function nextQuestion() {
            if (currentIndex < 9) { 
                currentIndex++;
                renderQuestion();
            } else {
                document.getElementById('view-exercise').classList.add('hidden');
                document.getElementById('view-result').classList.remove('hidden');
                
                const finalScore = Math.max(0, score);
                document.getElementById('final-score').innerText = finalScore;

                const diagBox = document.getElementById('diagnostic-box');
                const diagList = document.getElementById('diagnostic-list');
                
                if (wrongQuestionsInfo.length > 0) {
                    diagBox.classList.remove('hidden');
                    diagList.innerHTML = '';
                    wrongQuestionsInfo.forEach(item => {
                        const row = document.createElement('div');
                        row.className = "bg-slate-50 border border-slate-100 rounded-lg p-3 text-xs leading-relaxed text-slate-700";
                        row.innerHTML = `<span class="font-bold text-rose-600">[第 ${item.index} 題] (${item.tag})</span> ${item.desc}`;
                        diagList.appendChild(row);
                    });
                } else {
                    diagBox.classList.add('hidden');
                }
            }
        }
    </script>
</body>
</html>
